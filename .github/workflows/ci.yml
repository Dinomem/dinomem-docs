name: CI

on:
  push:
    branches: [main]
  pull_request:

# `next build` is the de-facto gate: it typechecks and statically generates
# every MDX page, so a broken page or dead import fails the build.
jobs:
  build:
    name: next build (validates all MDX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
